rationale: '**


  The central compositional problem for a Blue song is the tension between *present*
  and *forgotten* — the thing is happening now, but it is not being perceived. The
  place exists but cannot be located. This is why the arrangement refuses to resolve
  into traditional song form: verse-chorus-bridge implies a structure that knows where
  it is, and a Blue composition cannot know where it is.


  **The drone-anchor architecture.** `bass_sky_crane_drone` opens and closes the piece,
  functioning as the composition''s tonal immune system — the frequency that was always
  there before the forgetting began and remains after. By withholding this loop''s
  full context until the final section, the return at `rust_signal_complete` lands
  as recognition rather than recapitulation. You remember the room you''re in, briefly,
  before the transmission ends.


  **Polyrhythmic drift as forgetting-made-structural.** The choice to introduce loops
  with beat-counts that don''t divide evenly into 3/4 (4-beat harvester loops, 6-beat
  conveyor loops, 7-beat harrows/sprayer/sky crane loops) creates persistent low-frequency
  polyrhythmic drift throughout the arrangement. This isn''t metric complexity for
  its own sake — it''s the compositional equivalent of the place you can''t quite
  locate. The downbeats align, then drift, then realign differently. The three-decade
  collapse cycle has this quality: things that were synchronized (bees, harvests,
  crews, applications) slowly phase out of relationship with each other.


  **The vocal placement as forensic evidence, not emotional center.** `lyrics_v1`
  enters in `abundance_record` and exits definitively in `pollinator_range_contraction`,
  where it drops mid-section and is replaced by phantom melody only. This is deliberate:
  the human documentation voice is present during the record of abundance and present
  during the record of contraction, then archived. Its absence in the conveyor and
  final sections is not mourning — it''s completion of the documentation protocol.
  The voice filed its report. The voice is gone. The frequencies continue.


  **The stiffness gradient as toxicological timeline.** The arrangement moves through
  `bass_harvester_downbeat` → `bass_harvester` → `bass_harrows_stiff` → `bass_sprayer`
  → `bass_conveyor_stiff` as a progressive rigidity sequence. The "stiff" variants
  are not harsher-sounding necessarily, but they carry the label''s meaning compositionally:
  a system losing its ability to flex and respond. The one exception — `bass_conveyor_syncopated`
  entering for two bars at the end of the conveyor section — is the composition''s
  most precisely placed gesture. It is the syncopation that arrived too late. The
  body that could have moved differently, that didn''t, that now has been documented
  as not having moved differently.


  **The `drums_harvester_sparse` choice over high-energy variants.** At 60 BPM, "sparse"
  low-energy drums serve the memorial-technology mood more accurately than high-energy
  variants. High energy at this tempo reads as relentless rather than vital. The sparse
  pattern has gaps in it — those gaps are the 230 BPS phantom bee wing frequencies
  rendered as structured absence. The one moment where full `drums_harvester` enters
  (the single-pass surge in `abundance_record`, repeat four) is framed explicitly
  as malfunction rather than climax: the system briefly achieving full operation,
  then dropping back. This is how you document an industrial accident without dramatizing
  it.


  **Sounds-like reasoning.** Grouper for the way dissolution is treated as presence
  rather than absence. Basinski for the explicit use of degradation as memorial technology
  — *Disintegration Loops* as compositional ancestor. Jóhann Jóhannsson''s *Miners''
  Hymns* for the precise emotional register of industrial documentation that refuses
  to aestheticize suffering. Matana Roberts for forensic jazz — testimony as composition.
  Stars of the Lid and Hecker for the sustained-frequency drone architecture and the
  way melody can function as ghost-signal rather than narrative.'
