excerpts:
- 'Chapter 7: The Great Throttling

  Page 97


  The morning Miranda Vasquez discovered her neural interface had been bandwidth-capped
  to 0.3 terabits per second, she knew the Corporate Wars had finally reached the
  residential sectors. Through her apartment''s smart-glass, the city of Neo Francisco
  stretched below like a circuit board gone mad—towers blinking with data streams,
  aerial drones tracing packet routes through the smog-filtered sky.


  "Goddamn Telco Syndicate," she muttered, running diagnostics on her cranial ports.
  The readout was brutal: 99.7% reduction in cognitive bandwidth. At this rate, she''d
  be thinking like a baseline human within hours.


  Her neighbor Chen pounded on the wall—three short, two long. Morse code. The old
  ways were coming back as the new ones failed. Miranda tapped back: "Confirmed. They
  hit us all."


  Outside, the first riots were already starting. She could see the crowds gathering
  around the Comcast-Verizon Fusion Tower, their augmented reality overlays flickering
  like dying fireflies. Without proper bandwidth, the ARGs couldn''t maintain coherent
  virtual environments. People were being forced back into meatspace, and they didn''t
  like what they saw.


  The Syndicate''s strategy was brilliant in its simplicity: control the pipes, control
  the minds. In 2047, consciousness itself had become a streaming service.'
- 'Page 98


  Miranda''s wrist display chimed with an encrypted message from her handler at the
  Free Data Liberation Front. The text crawled across her retina at prehistoric speeds:


  "OPERATION FIBER OPTIC COMMENCING 0800 HOURS. RENDEZVOUS POINT ALPHA. BRING HARDWIRED
  GEAR ONLY."


  She smiled grimly. The resistance had been preparing for this day since the Net
  Neutrality Wars of 2031. While the corporations had been busy building their bandwidth
  monopolies, the FDLF had been constructing something far more dangerous: a parallel
  network that existed in the spaces between spaces, in the quantum foam where information
  traveled faster than light itself.


  Miranda pulled her grandfather''s laptop from its lead-lined case—a genuine 2025
  model with actual copper wiring and a physical keyboard. Primitive by 2047 standards,
  but immune to the Syndicate''s throttling algorithms. She''d need it where she was
  going.


  The revolution would be analog.


  Through her window, she watched a Telco enforcement drone sweep past, its sensors
  probing for unauthorized data streams. It paused, hovering outside her building
  like a mechanical vulture. Miranda held her breath, knowing that even this thought—transmitted
  through her compromised neural interface—might be enough to give her away.'
