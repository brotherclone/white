concept: This composition functions as an audio documentary of the legendary Phantom
  Studios Metronome Incident of June 1991 in Sussex County, NJ, where a modified 7/8
  metronome allegedly induced phantom limb syndrome in four musicians attempting to
  document 'absent phenomena.' The piece operates at 91 BPM (half of the mythical
  182 transmission speed) in perpetual 7/8 time, creating the phantom eighth beat
  that drove the original band members to medical crisis. The metronome itself becomes
  the central symbolic object - a mechanical heartbeat marking time to impossible
  rhythms, its tick-tick-tick-PAUSE pattern serving as both compositional structure
  and conjuration device. Field recordings from the abandoned studio mix with EVP
  fragments and medical equipment sounds, while the gonzo journalist's paranoid narrative
  voice threads through the sonic archaeology. The composition transmigrates from
  INFORMATION (clinical documentation) through TIME (obsessive repetition) toward
  SPACE (the phantom beat that exists only in absence). Each phase dissolves the boundary
  between observer and observed, as the listener develops their own phantom limb reaching
  for the missing eighth beat. The metronome's impossible persistence - running three
  days unwound - becomes a legend of mechanical haunting, where systematic documentation
  of absence creates presence through strategic incompletion. Sussex County's buried
  secrets manifest as rhythmic phantoms that infect anyone who listens too long."
