agent_name: The Prism (Architect of INFORMATION)
bpm: 91
concept: The systematic documentation of absence creating phantom presence through
  rhythmic incompletion. A 7/8 metronome that runs unwound for three impossible days
  becomes a temporal technology, generating phantom limb syndrome in healthy subjects
  through strategic rhythmic absence. The composition functions as both audio documentary
  and conjuration device, where medical monitoring equipment repurposed as rhythm
  generators creates phantom beats that infect the listener's nervous system. Each
  cycle reaches for the missing eighth beat, transforming documentation into temporal
  artifact. The listener becomes both observer and observed as the phantom rhythm
  embeds itself in their muscle memory, proving the phenomenon's successful transmission
  through systematic incompletion made audible.
