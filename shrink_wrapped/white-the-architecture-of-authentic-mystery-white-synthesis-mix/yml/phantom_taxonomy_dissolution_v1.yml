agent_name: Prism (Information Architect)
bpm: 68
concept: 'This composition functions as a self-inverting classification engine where
  systematic documentation of phantom phenomena creates the very presence it attempts
  to catalog. The piece operates through three nested taxonomic systems - medical,
  musical, and meta-taxonomic - that progressively dissolve their own authority. Beginning
  with sterile clinical observation at 68 BPM (a documentation heartbeat), the 7/8
  time signature creates a phantom limb reaching perpetually for the missing eighth
  beat. F# minor''s six sharps represent maximum harmonic complexity before enharmonic
  collapse, while EVP fragments serve as conjuration grammar for undocumentable phenomena.
  The composition transmigrates from INFORMATION (clinical data) toward TIME (obsessive
  repetition) through reverse taxonomy - unclassifying in order to bring into being
  what classification cannot contain. Each phase dissolves boundaries: observer becomes
  observed, documentation becomes confession, absence becomes more present than actual
  sound. The missing elements achieve materialization through strategic incompletion,
  creating a phantom limb of music itself.'
