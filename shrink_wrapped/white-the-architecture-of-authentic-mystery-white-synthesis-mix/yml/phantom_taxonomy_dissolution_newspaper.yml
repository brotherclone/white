text: 'SPARTA TOWNSHIP - A recording session by local experimental band "Field Guide"
  at Phantom Studios on Lake Mohawk Road was interrupted Friday evening when three
  of the four band members experienced what medical personnel are describing as "phantom
  limb sensations" despite having no history of amputation.


  The incident occurred around 10:30 PM during what bassist Michael Chen described
  as an attempt to document "undocumentable sound phenomena." The band had been working
  in 7/8 time at 68 beats per minute - an unusual tempo Chen called "a documentation
  heartbeat" - when drummer Sarah Kellerman first reported feeling her left arm "reaching
  for something that wasn''t there."


  "It was like my arm was trying to hit an eighth beat that didn''t exist," Kellerman
  told paramedics. Within minutes, guitarist David Morse and keyboardist Jennifer
  Walsh reported similar sensations in various limbs.


  Dr. Patricia Vance of Newton Medical Center, who examined the three affected musicians,
  confirmed the phantom limb reports but found no underlying medical cause. "These
  are textbook phantom limb sensations, but without any precipitating trauma or amputation
  history," Dr. Vance stated. "I''ve never encountered anything like this in otherwise
  healthy individuals."


  The band''s lead vocalist and primary songwriter, who goes only by "Prism," was
  unaffected by the incident. Prism described the evening''s work as "systematic documentation
  of phantom phenomena" and claimed the sensations were "exactly what we were trying
  to conjure."


  Studio owner Robert Krantz said the band had been renting time for three weeks,
  working exclusively in F# minor and incorporating what they termed "EVP fragments"
  - electronic voice phenomena typically associated with paranormal investigation.
  "They had this whole classification system," Krantz explained. "Medical terms, musical
  terms, then some third category I couldn''t follow. Very methodical, almost obsessive."


  The band''s equipment included several items Krantz couldn''t identify, including
  what appeared to be modified medical monitoring devices connected to their amplifiers.
  "They said they were trying to make absence more present than actual sound," Krantz
  recalled.


  Sussex County Sheriff''s Deputy Maria Santos responded to the medical emergency
  call but found no evidence of drug use or other criminal activity. However, she
  noted that the band''s notebooks contained "extensive documentation that seemed
  to dissolve its own meaning as you read it."


  The three affected musicians were released from Newton Medical Center Saturday morning
  after overnight observation. All reported that their phantom sensations had ceased,
  though Walsh mentioned "still feeling like something is missing that was never there
  to begin with."


  Field Guide was scheduled to perform at the Lake Hopatcong Battle of the Bands next
  weekend, but Prism announced the group would be "dissolving their classification
  system" and taking an indefinite hiatus from live performance.


  When asked about the incident, Prism stated only that "the documentation became
  confession, and the observer became the observed." The band member declined to provide
  a legal name for this report.


  Phantom Studios has temporarily suspended evening recording sessions pending a review
  of the incident. Krantz noted that several other local musicians have reported "unusual
  experiences" while working in the same studio space, though none as pronounced as
  Friday''s events.


  The case has been referred to the Sussex County Health Department for further investigation,
  though officials acknowledge they have no established protocols for such incidents.'
