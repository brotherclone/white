excerpts:
- '*From Section III: The Cosmic Trigger Mechanism*


  Page 4


  The thing about reality tunnels, man, is that once you''ve seen through one, you
  can never quite trust any of them again. Like, there I was in ''68, thinking I had
  it all figured out - the Illuminati were the bad guys, the government was their
  puppet, and we were the righteous rebels fighting the good fight. Simple, clean,
  binary.


  But then the acid kicked in during that meeting in Berkeley, and suddenly I could
  see the whole chess board from above. The Illuminati weren''t just one thing - they
  were fractal, recursive, a self-organizing conspiracy that included its own opposition.
  Every revolutionary was also an agent. Every agent was also a revolutionary. The
  system had learned to metabolize its own contradictions.


  "Jesus," I said to Bob Shea later, "what if the conspiracy isn''t trying to control
  us? What if it''s trying to wake us up?"


  He just laughed that cosmic laugh of his. "Welcome to Chapel Perilous, brother.
  Population: everyone who''s figured out they''re inside a story."


  That''s when I realized the real secret: there is no secret. Or rather, the secret
  is that there''s always another level of secret beneath the one you just discovered.
  It''s turtles all the way down, except the turtles are made of pure information,
  and they''re dancing.'
- '*From Section VII: The Bavarian Fire Drill*


  Page 5


  FNORD.


  Did you see it? No? Good. That means the conditioning is still working. The average
  human mind processes approximately 2 million bits of sensory information per second
  but only consciously registers about 126 bits. The rest gets filtered through what
  we might call the reality editing system - a neurological firewall that keeps us
  sane by keeping us ignorant.


  But here''s the kicker: someone else programmed that firewall.


  The Bavarian Illuminati figured this out in 1776 (same year as the American Revolution
  - coincidence? In a pig''s eye!). They realized that if you could control the filtering
  mechanism, you could control perceived reality without having to control actual
  reality. Much more efficient. Why move mountains when you can just edit them out
  of people''s awareness?


  FNORD appears in every major newspaper, every TV broadcast, every social media feed.
  It''s a hypnotic trigger that induces a micro-anxiety state, making the adjacent
  information seem more urgent and believable. Most people literally cannot see it
  - their brains have been programmed to edit it out since childhood.


  But once you know it''s there, you start seeing it everywhere. FNORD in the stock
  reports. FNORD in the weather forecast. FNORD FNORD FNORD bleeding through the cracks
  of consensus reality like light through a damaged film strip.


  The question isn''t whether you''re being manipulated. The question is: by whom,
  and to what end?


  (And the really scary question: what if the manipulators themselves don''t know?)'
