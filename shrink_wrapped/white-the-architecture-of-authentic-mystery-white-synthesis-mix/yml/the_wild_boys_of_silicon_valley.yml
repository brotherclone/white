excerpts:
- 'We were somewhere around Palo Alto when the venture capital began to take hold.
  I remember saying something like "I feel a bit lightheaded; maybe you should drive..."
  And suddenly there was a terrible roar all around us and the sky was full of what
  looked like huge bats, all swooping and screeching and diving around the car, which
  was going about a hundred miles an hour with the top down to Menlo Park. And a voice
  was screaming: "Holy Jesus! What are these goddamn animals?"


  Then it was quiet again. My attorney had taken his shirt off and was pouring beer
  on his chest, to facilitate the tanning process. "What the hell are you yelling
  about?" he muttered, staring up at the sun with his eyes closed and covered with
  wraparound Spanish sunglasses. "Never mind," I said. "It''s your turn to drive."
  I hit the brakes and aimed the Great Red Shark toward the shoulder of the highway.
  No point mentioning those bats, I thought. The poor bastard will see them soon enough.


  But this wasn''t about bats. This was about something far more dangerous: the complete
  transformation of American capitalism by a handful of freaks in garage laboratories
  who thought they could change the world with silicon chips and lines of code. The
  Wild Boys, as I came to call them. Not the romantic outlaws of Burroughs'' fever
  dreams, but something far more sinister: entrepreneurs.'
- 'The medicine man''s eyes were like obsidian mirrors reflecting the glow of twenty-seven
  computer monitors arranged in a perfect circle around his meditation mat. Don Juan
  Matus had traded his desert for a server farm in Cupertino, his peyote buttons for
  lines of code that could bend reality itself.


  "You still don''t see," he said, his weathered fingers dancing across three keyboards
  simultaneously. "The separate reality isn''t in the desert anymore, Carlos. It''s
  here, in the spaces between the ones and zeros."


  I watched as he compiled what he called a "digital ally" - a program that seemed
  to pulse with its own life force. The screen flickered with patterns that reminded
  me of the geometric visions I''d experienced during our sessions with the little
  smoke, but these were different. These were alive in a way that transcended mere
  hallucination.


  "Every startup founder," Don Juan continued, "must learn to stop the world. Not
  through mushrooms or datura, but through the systematic deconstruction of what people
  believe to be possible. Jobs understood this. Gates too, though he was always too
  attached to his personal history to become a true nagual."


  The terminal beeped. His digital ally was complete. "Now," he said, "we begin your
  real education in the warrior''s path of Silicon Valley."'
