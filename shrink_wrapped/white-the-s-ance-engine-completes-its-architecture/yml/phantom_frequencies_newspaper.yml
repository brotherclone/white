text: 'MONTAGUE TOWNSHIP - A local teenage rock band''s practice session Friday night
  resulted in widespread radio interference and the hospitalization of one youth,
  according to Sussex County Sheriff''s deputies and emergency medical personnel.


  The incident occurred at approximately 9:47 p.m. in a converted barn on Deckertown
  Turnpike, where the four-member band "Null Spectrum" had been rehearsing since October.
  Neighbors reported that AM and FM radio reception within a two-mile radius became
  "completely scrambled" during the band''s practice sessions, with some residents
  claiming to hear fragments of the band''s music bleeding through their television
  sets.


  "It started about three weeks ago," said Margaret Hoffman, whose farm borders the
  practice space. "First it was just static, but then you could hear this strange
  music coming through the radio - real quiet, like it was hiding under the regular
  stations."


  The band, comprised of Montague High School students aged 16-18, had been experimenting
  with modified electronic equipment, according to lead guitarist David Chen, 17.
  "We weren''t trying to cause trouble," Chen told deputies. "We just wanted our sound
  to be different. We found these old radio transmitters at a yard sale and figured
  out how to wire them into our amps."


  The situation escalated Friday when bassist Jennifer Walsh, 16, collapsed during
  practice and was found by bandmates in an unresponsive state. Emergency medical
  technicians reported Walsh''s vital signs were normal, but she remained unconscious
  for approximately 40 minutes, during which time the radio interference reached its
  peak intensity.


  "She just stopped playing mid-song and stood there for maybe ten seconds," said
  drummer Michael Torres, 18. "Then she dropped the bass and fell backward. But the
  weird thing was, her bass kept making sound even though it wasn''t plugged into
  anything."


  Dr. Patricia Reeves at Newton Memorial Hospital, where Walsh was treated and released
  Saturday morning, declined to comment on the specifics of Walsh''s condition, citing
  patient confidentiality. However, she confirmed that Walsh showed no signs of drug
  use or underlying medical conditions that would explain the episode.


  Federal Communications Commission inspector Ronald Blackwood arrived Saturday to
  investigate the radio interference complaints. After examining the band''s equipment,
  Blackwood ordered the immediate confiscation of several modified transmitters, describing
  them as "operating outside regulated frequency bands."


  "These devices were broadcasting on frequencies that shouldn''t have been accessible
  with consumer equipment," Blackwood said. "We''re still trying to determine how
  they achieved the signal penetration they did with such low-wattage devices."


  The band''s equipment was removed Saturday afternoon, but some residents report
  continued intermittent interference. Walsh, who was released from the hospital Saturday
  morning, could not be reached for comment.


  Montague Township Police Chief Robert Martinez said no charges have been filed,
  but the investigation remains open. "At this point, we''re treating it as an equipment
  malfunction that resulted in a medical emergency," Martinez said. "But there are
  some unusual aspects to this case that we''re still looking into."


  The barn where the band practiced has been sealed by township officials pending
  further investigation. The band''s remaining members said they have no plans to
  continue performing together.


  "It doesn''t feel right without Jenny," Chen said. "And honestly, some of the sounds
  we were making... I''m not sure we understood what we were doing."'
