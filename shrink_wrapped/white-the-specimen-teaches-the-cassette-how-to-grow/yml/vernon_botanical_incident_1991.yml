text: 'VERNON TOWNSHIP - What began as an experimental concert by local band "Digital
  Refugees" at the abandoned Hartley Greenhouse complex Friday night has left authorities
  and botanists puzzled after electronic equipment reportedly began sprouting plant
  matter during the performance.


  The five-member band, comprised of Vernon High School students and recent graduates,
  had been using the defunct greenhouse on Route 515 as an unauthorized rehearsal
  space for several months. Band leader Marcus Chen, 19, told police the group was
  exploring what he called "bio-electronic fusion" - combining traditional rock instruments
  with field recordings of natural sounds.


  "We were trying to make music that could talk to plants," Chen explained to officers.
  "We thought the greenhouse would be the perfect acoustic space."


  According to witness statements from approximately 30 attendees, the concert proceeded
  normally until the band began their final composition, titled "Photosynthetic Data
  Stream." Multiple witnesses report that amplifiers, synthesizers, and even guitar
  strings began producing what appeared to be moss, small ferns, and unidentifiable
  green growth.


  "It started with just little sprouts coming out of the speaker cones," said Jennifer
  Walsh, 17, of Highland Lakes. "But by the end of the song, Marcus''s guitar was
  completely covered in vines. The weird part was, it kept playing perfectly."


  Dr. Sarah Brennan, a botanist from Rutgers University who examined samples from
  the scene, confirmed that the plant matter shows characteristics of both common
  greenhouse species and unknown varieties. "The cellular structure is unlike anything
  in our regional taxonomy," Brennan stated. "More concerning is that the plants appear
  to have grown at an impossible rate - possibly several months'' worth of growth
  in under an hour."


  Vernon Township Police Chief Robert Martinez said no charges have been filed, though
  the teenagers were cited for trespassing. More troubling to authorities were reports
  that several concert attendees experienced what they described as "time slips" during
  the performance.


  "Three kids came to the station Saturday morning claiming they''d lost several hours,"
  Martinez said. "They insisted they''d only been at the concert for 45 minutes, but
  witnesses saw them there for over three hours. We''re treating it as a possible
  drug-related incident."


  However, voluntary blood tests on all band members and several attendees came back
  negative for controlled substances. Dr. Michael Kowalski, a psychiatrist at Newton
  Medical Center who examined some of the teenagers, described their condition as
  "acute temporal disorientation with botanical fixation."


  "They keep talking about ''learning plant time'' and ''growing beyond the system,''"
  Kowalski reported. "It''s unlike any substance-induced episode I''ve encountered."


  The Hartley Greenhouse, which has been abandoned since 1987, was reportedly filled
  with thriving plant life when police arrived Saturday morning, despite having been
  barren for years. Property owner James Hartley said he has no explanation for the
  sudden vegetation.


  "That place was dead concrete and broken glass," Hartley said. "Now it looks like
  a jungle. I don''t know whether to call it vandalism or a miracle."


  The band''s equipment remains at the scene, apparently impossible to remove due
  to extensive root systems that have grown through the electronic components. Chen
  and his bandmates have been banned from the property, though they continue to claim
  their music "taught the machines how to photosynthesize."


  "We weren''t trying to make anything weird happen," Chen insisted. "We just wanted
  to make music that could grow instead of just play."


  The incident has drawn attention from researchers at Princeton University''s Department
  of Consciousness Studies, who declined to comment pending further investigation.


  Vernon Township has declared the greenhouse property temporarily off-limits to the
  public while officials determine how to proceed. The building''s new plant life
  continues to thrive despite the onset of winter weather, leading some residents
  to speculate about the long-term effects of what locals have begun calling "the
  growing concert."


  Digital Refugees have not announced any future performances.'
