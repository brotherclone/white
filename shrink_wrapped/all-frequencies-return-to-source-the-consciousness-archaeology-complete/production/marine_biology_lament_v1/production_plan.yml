rationale: '**


  **Blue''s axes — Present / Place / Forgotten** — demand a song that is spatially
  vivid and temporally suspended, not arriving from memory like Red or anticipating
  like Violet, but *inhabiting* a present tense that has been erased. The structural
  challenge is that Blue''s "forgotten" axis doesn''t mean hazy or impressionistic
  — it means the place is hyper-specific, fully documented, and *nonetheless lost*.
  Room 7 is remembered in extraordinary detail precisely because it no longer exists
  as lived experience. The arrangement has to hold both of those things.


  **The double intro** solves the entry problem. Six bars is long enough to be a complete
  small world, and running it twice means the listener arrives in the place before
  any human subjectivity enters — the data logger beep is already ticking, the reef
  is already dying, the routine is already in motion. Gabriel is late to his own alternate
  life. The lap steel arriving in the second pass is the first sign that something
  emotionally inhabited is coming, but we''re still in instrument-only territory:
  pure place, no person yet.


  **Two verse blocks of two repeats each**, with a single chorus between them, creates
  a slow-building documentary structure that honors the folk-rock traditions named
  in the brief. The Springsteen influence lives here — working-class routine narrated
  with granular specificity, the dignity of technical knowledge (coral identification,
  predetermined sites, data logging protocols). Giving the chorus only one repeat
  on its first appearance keeps the 30.2°C motif in the realm of hypothesis rather
  than statement. The listener hears the threshold but hasn''t yet understood what
  it means.


  The **second verse pair** is where the song shifts from orientation to investment
  — this is the life being *learned*, not just observed, and the mandolin entering
  here marks that shift instrumentally. Coming out of this into a **double chorus**
  allows the motif to transform: first pass is recognition and grief, second pass
  is full-throated mourning. The lap steel''s upward movement on the second pass is
  the closest the song gets to beauty before the bridge.


  **The bridge is the hinge of the entire arrangement.** One repeat only — it cannot
  be revisited or softened. June 12th is a date, a specific hydrophone recording,
  a co-authorship credit: these are the things that make the counterfactual unbearable,
  because they are the exact moments where the unlived life becomes most real. The
  structural instinct is to drop everything but the pump organ''s slow attack and
  the beep — the pump organ because it has always been slow to arrive and slow to
  release, because it breathes like something underwater, because its slow attack
  means you feel the note before you hear it. The bridge should feel like the reef
  itself producing testimony.


  The **final double chorus** is the emotional release that the bridge earns. The
  first pass is quiet emergence — the motif carrying the hydrophone recording with
  it now, changed. The second pass is the fullest instrumentation the song has seen,
  the beep absorbed into the rhythm section rather than hovering above it: the data
  logger is no longer separate from the music, it *is* the music. This is witness
  succession made structural — the scientific documentation and the artistic documentation
  finally occupying the same frequency.


  Returning to **the intro as outro** is the most important formal decision in the
  arrangement. Blue is the color of forgotten places, and the song has to end by returning
  to the place rather than to the person. Gabriel exits the frame; the reef continues
  its documented dissolution. The parlor guitar playing the temperature motif unresolved
  — not arriving at the tonic, not completing the phrase — is the arrangement''s argument
  about what Blue actually sounds like: not grief that resolves, but signal that continues
  transmitting after anyone capable of receiving it is gone.'
