rationale: 'Orange maps to **Past / Place / Known** — and that triple axis is the
  engine of this arrangement. The song is not about discovery; it is about excavation
  of something that already happened, in a specific location, that is documented (even
  if the documents are sealed). The arrangement should feel like reading a map that
  reads you back.


  With only one section available — the `arp` loop at 6 bars — the entire compositional
  grammar has to live in *how many times* and *with what intention*. Fortunately,
  7/8 in F# minor at 91 BPM already contains enormous internal asymmetry. The loop
  will never feel static if the playback context shifts around it. The proposal gives
  you five distinct *encounters* with the same material, each one re-contextualizing
  what the arp means.


  **Block 1 (×3, ~18 bars):** This is the INFORMATION phase — individual tremor data.
  Three plays is enough to establish the pattern without explaining it. Orange''s
  "Known" axis means the listener should feel they are recognizing something, not
  meeting it for the first time. Keep this sparse in the mix: one or two elements,
  high in the frequency range, slightly wet. The Byram Township grid exists before
  the song begins; we are arriving late.


  **Block 2 (×5, ~30 bars):** The TIME phase kicks in — collective recognition. Five
  plays in 7/8 creates a polyrhythmic accumulation that resists easy counting; the
  ear starts to feel the asymmetrical heartbeat rather than track it. This is where
  the "municipal-networked" mood should peak texturally. Layer in the storm-drain-electronics
  elements here, let the bass frequencies start to suggest infrastructure weight.
  The concrete is not yet conscious but it is warm.


  **Block 3 (×2, ~12 bars):** The surveillance gap. This is the arrangement''s most
  important structural decision: a sudden contraction after the longest build. Two
  plays only — barely enough to register before it''s gone. In the concept, the Storm
  Drain Map exists "sideways to surveillance reality," meaning it disappears from
  official view. Strip the arrangement back hard here. Solo the arp or reduce to skeleton.
  This is where the gonzo-journalism axis lives: the moment the filed report goes
  missing, the EKG files get sealed. The absence is the evidence.


  **Block 4 (×7, ~42 bars):** Seven plays — one for each beat of the time signature,
  one for each beat of the asymmetrical heartbeat, one for each of the documented
  Newton Memorial EKG anomalies (which I am inventing right now in the spirit of the
  genre). This is the SPACE phase: the legendary storm drain network crystallizing.
  This is the longest, heaviest, most fully synchronized block. All four teenage prophets
  are transmitting. Let everything that has been withheld arrive here. The F# minor
  should feel inevitable, not tragic. Orange''s "Place" axis means the location itself
  is the protagonist — Byram Township underground is achieving something. The music
  should feel like infrastructure breathing at scale.


  **Block 5 (×3, ~18 bars):** No resolution. Orange is the *Past* — the thing has
  already happened. The ending does not conclude the event; it confirms that the event
  continues to have been. Three plays mirrors the opening, but the arp now means something
  different because we have been through the synchronization. Let the final play fade
  or loop without a clean cut — the storm drain map does not end, it simply passes
  below the threshold of what journalism can document. The heartbeat is still in the
  concrete. The song just stops listening.


  Total runtime at 91 BPM in 7/8: approximately 20 plays × 6 bars × ~3.3 seconds per
  bar ≈ **~6 minutes 35 seconds**. Long enough to feel like municipal time. Short
  enough that the teenage prophets are still running.'
