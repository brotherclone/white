proposed_sections:
- name: INTRO — The Tanker at Rest
  repeat: 1
  energy_note: 'Deceptively still. A single chord loop, no drums yet. The song presents

    itself as honest and elemental — the tanker sitting in harbor before dawn.

    Marvin hasn''t entered yet. This is the landscape before the ideology.

    The loop breathes. Nothing feels artificial. That''s the trap.

    '
  transition_note: 'Bass enters on the last bar of repeat 1, low and slow, pulling
    the floor

    out from under the stillness. Drums land on bar 1 of VERSE 1 like a

    shift whistle.

    '
  loops:
    chords: tanker
    drums: null
    bass: bass_tanker_hold
    melody: null
- name: VERSE 1 — Clocking In
  repeat: 2
  energy_note: 'The anthem begins in earnest. Organic-feeling, chest-out, Heartland

    proud. Drums are present but sit just slightly too perfectly on the grid —

    the uncanny valley hasn''t arrived yet, just a faint wrongness, like a

    photograph that''s been touched up. Marvin''s voice is completely unprocessed

    here. The community is intact. The refinery is still running.

    '
  transition_note: 'Second repeat ends with a drum fill that is unmistakably quantized
    — a

    tell. Into PRE-CHORUS without breath.

    '
  loops:
    chords: rural_introspection
    drums: drum_rural_introspection
    bass: bass_rural_introspection
    melody: melody_rural_introspection_alt
- name: PRE-CHORUS — Shift Change
  repeat: 1
  energy_note: 'The song tightens. The melody drops out. Bass and drums only, with
    the

    chord loop riding above. Something industrial and rhythmic asserts itself.

    A hint of the machine that will eventually win. Energy rises but it

    feels controlled — corporate, not communal.

    '
  transition_note: 'Chords resolve hard into the CHORUS root. Drums lock to a metronomic

    pulse that feels like a time-clock punch.

    '
  loops:
    chords: sleep_aside_the_tracks
    drums: drum_sleep_aside_the_tracks
    bass: bass_sleep_aside_the_tracks
    melody: null
- name: CHORUS 1 — Supertanker Pride
  repeat: 2
  energy_note: 'Full, rousing, almost triumphant. This is the song''s public face
    — the

    blue-collar anthem as it wants to be heard. The three_liter_mountain_dew

    chord loop carries a slightly garish grandeur, the sonic equivalent of

    a patriotic bumper sticker. Melody is present and singable. Marvin

    sounds like he believes it. Or is performing belief. The listener

    cannot yet tell which.

    '
  transition_note: 'Chorus 2 ends with a cold cut — not a fill, not a fade. Silence
    for

    one beat. Then the VERSE 2 loop starts from a place of subtle wrongness.

    '
  loops:
    chords: three_liter_mountain_dew
    drums: drum_three_liter_mountain_dew
    bass: bass_three_liter_mountain
    melody: melody_no_oil_for_blood
- name: VERSE 2 — Automation Notice
  repeat: 2
  energy_note: 'The uncanny valley deepens. The rebar_cybernetics chord loop replaces

    the organic rural introspection — same emotional territory, but harder

    edges, industrial grind beneath the sentimentality. Drums are now

    noticeably mechanical, the alt pattern introducing a slightly inhuman

    snare placement. Marvin''s voice gets its first breath of auto-tune

    correction — just barely audible, a shimmer, a ghost of processing.

    The nostalgia is still present but now feels manufactured.

    '
  transition_note: 'A low industrial drone (bass_rebar_cybernetics held note) swells
    under

    the final bar. PRE-CHORUS hits harder than the first time.

    '
  loops:
    chords: rebar_cybernetics
    drums: drum_rebar_cybernetics
    bass: bass_rebar_cybernetics
    melody: melody_missed_off_ramp
- name: PRE-CHORUS — The Time Clock Again
  repeat: 1
  energy_note: 'More menacing than the first pass. The same loops but the context
    has

    shifted — what felt like rising energy now feels like a tightening vice.

    The melody stays absent. The grid is absolute.

    '
  transition_note: 'Same hard resolve into the CHORUS root, but the bass sits a fraction

    louder, the machine asserting dominance.

    '
  loops:
    chords: sleep_aside_the_tracks
    drums: drum_sleep_aside_the_tracks
    bass: bass_sleep_aside_the_tracks_hold
    melody: null
- name: CHORUS 2 — The Brand
  repeat: 2
  energy_note: 'Still anthemic on the surface. But now the auto-tune on Marvin''s
    voice

    is undeniable — not corrective, performative. The melody has become a

    product. The alt drum loop replaces the standard, introducing a

    quantized precision that no human drummer would choose. The anthem

    has become advertising copy.

    '
  transition_note: 'At the end of repeat 2, the drums do not fill — they simply stop,
    mid-

    pattern, as if the track was cut in an edit suite. The BRIDGE enters

    into that silence.

    '
  loops:
    chords: three_liter_mountain_dew
    drums: drum_liberal_arts_degree_revenge_alt
    bass: bass_three_liter_mountain_alt
    melody: melody_liberal_arts_degree_revenge
- name: BRIDGE — The Supertanker's Cargo
  repeat: 1
  energy_note: 'The song''s structural exposure. The liberal_arts_degree_revenge chord

    loop is the tell in the name — the revenge of the aesthetic colonizer,

    the person who studied working-class culture from a distance and

    packaged it. The gorgeous melody loops (both are described as gorgeous,

    and that beauty is exactly the indictment) play against a bass that has

    dropped to its lowest, most industrial register. Drums are the missed_off_ramp

    pattern — the wrong turn that led here. Marvin''s voice is now fully

    processed, auto-tune not hiding but displayed. The contempt is becoming

    structural. The miss_off_ramp_alt loop (97 bars — an enormous, edited

    instrumentation piece) begins its slow reveal here, sitting beneath

    everything as a kind of industrial drone score, too long to resolve,

    just present and grinding.

    '
  transition_note: 'The 97-bar miss_off_ramp_alt loop continues running under the
    final

    sections, never completing — the sonic equivalent of the supertanker

    that never arrives to port. The FINAL CHORUS enters over it.

    '
  loops:
    chords: liberal_arts_degree_revenge
    drums: drum_missed_off_ramp
    bass: bass_liberal_arts_degree_revenge
    melody: miss_off_ramp_alt
- name: CHORUS 3 — Boutique Authenticity
  repeat: 3
  energy_note: 'The contempt is now open. All the warmth has been metabolized by the

    machine. The liberal_arts_degree_revenge chord loop stays from the bridge —

    no return to rural_introspection, no redemption arc. The alt melody

    (also gorgeous, also an indictment of its own beauty) plays over drums

    that are maximally quantized, inhuman, perfect. The bass alt pattern

    is medium register, businesslike. The third repeat strips the melody

    entirely — just chords, drums, bass, and Marvin''s processed voice,

    which by now sounds like a focus-grouped facsimile of a working man.

    The supertanker is carrying the aesthetic of industrial decay to

    consumers who will stream it on commutes.

    '
  transition_note: 'Repeat 3 ends not with a crash but with a slow, mechanical decrescendo
    —

    the machine powering down in sequence. Bass holds its final note two

    bars past where the drums stop. Chords ring out in artificial reverb.

    The miss_off_ramp_alt loop, still not finished, gets cut mid-bar.

    '
  loops:
    chords: liberal_arts_degree_revenge
    drums: drum_liberal_arts_degree_revenge
    bass: bass_liberal_arts_degree_revenge_alt
    melody: melody_liberal_arts_degree_revenge_alt
- name: OUTRO — No Oil for Blood
  repeat: 2
  energy_note: 'The no_oil_for_blood loop is the song''s final confession. The name

    says it: the exchange has been made, and it was never honest. Bass

    is low, exposed, alt pattern (medium register, a kind of defiant

    resignation). Drums are the alt rural_introspection pattern — a

    ghostly return to where we started, but now recognizably artificial.

    No melody. The miss_off_ramp_alt has been cut. What remains is the

    skeleton: chord, bass, drum. Marvin does not sing. If there is a

    vocal, it is processed beyond recognition, a texture not a voice.

    The song ends before the loop resolves.

    '
  transition_note: 'Song ends mid-loop. Not a fade. A cut. The last thing heard is
    a single

    kick drum hit — quantized, alone, perfectly on the grid. Then nothing.

    '
  loops:
    chords: no_oil_for_blood
    drums: drum_rural_introspection_alt
    bass: bass_no_oil_for_blood_alt
    melody: null
rationale: '**On choosing Indigo over any other color**


  Indigo is the color that "isn''t real" — it occupies the spectrum between blue (Present/Place/Forgotten)
  and violet (Future/Person/Imagined), and its ontological instability is the concept''s
  engine. The song''s central act is presenting something as authentic that is ontologically
  fake: not lying exactly, not imagined exactly, but slotting into a perceptual category
  that doesn''t exist without cultural enforcement. Newton had to *invent* indigo
  to make the rainbow work out to seven colors. Supertanker Townie had to be *invented*
  — the townie identity, the refinery pride, the whole aesthetic — to make a market
  segment work out. The arc of the arrangement is therefore not a dramatic reveal
  but a slow perceptual erosion, the way you can stare at indigo in a spectrum and
  watch it become either blue or violet depending on what you''re willing to believe.


  **On the loop selection logic**


  The sequence `rural_introspection → rebar_cybernetics → liberal_arts_degree_revenge`
  is the song''s hidden spine. It narrates the colonization arc without a single lyric:
  organic/rural feeling, then industrialized/cybernetic, then the liberal arts education
  asserting its revenge on authentic culture through aesthetic appropriation. This
  three-stage transformation governs which chord loops anchor each major section.


  The `tanker` loop opens the song despite its "needs editing to resolve" notation
  in the inventory — that unresolved quality is structurally correct for an INTRO
  that is a trap. Let it sit unresolved before the drums arrive.


  `three_liter_mountain_dew` for the choruses is a deliberate choice of garish grandeur.
  The name itself is working-class signifier as commodity product, a brand not a drink.
  Both choruses get it because the anthem needs to sound like an anthem before it
  doesn''t.


  `miss_off_ramp_alt` at 97 bars is the most important loop in the arrangement and
  the only one that never finishes. It is assigned to the BRIDGE but it runs past
  its section — a compositional instruction to the human building in Logic Pro to
  not terminate it at the section boundary. Let it grind beneath the final chorus.
  Cut it mid-bar before the outro. The incompleteness is the point. The supertanker
  that never docks.


  **On the energy arc as Indigo logic**


  Most songs build to a chorus and release tension there. This arrangement inverts
  that: the CHORUS 1 is the song''s most emotionally genuine moment, and each subsequent
  chorus *removes* warmth rather than adding it. The energy metric isn''t volume or
  intensity — it''s the ratio of human-to-machine, organic-to-quantized. That ratio
  degrades in one direction. There is no turn, no redemption, no return home. By CHORUS
  3, the removal of the melody on the third repeat means the anthem has been hollowed
  of its singable core. What remains is the infrastructure of an anthem without its
  humanity.


  The outro using `no_oil_for_blood` after no previous use of that loop is a structural
  sucker-punch: new material in the outro signals that the song is not resolving,
  it is continuing past its own conclusions. The exchange has been made before the
  song started. The title told you. The processing told you. The loop names told you.
  Nothing for nothing. No oil, no blood, no trade that wasn''t already a theft.


  **On the sounds_like choices**


  Springsteen''s *Nebraska* is the foundational text of the genre Supertanker Townie
  is imitating — solo, intimate, blue-collar. Invoking it places the song in a lineage
  before subverting it. NIN''s quiet industrial dread (not the industrial triumph
  of "March of the Pigs" but the domestic collapse of "Hurt") is the tonal model for
  how the machine wins — not loudly. Lankum for the folk-horror undercurrent, the
  sense that the traditional form is carrying something poisoned. Phosphorescent for
  the way beauty can be used as an instrument of melancholy rather than consolation.
  The National because by the end of their late records the dread always wins against
  the warmth, and they make you grateful for it.'
