excerpts:
- 'Chapter 3: The Commodification of Experience

  Page 4


  You see, Charlie, the thing about being a user is that you never really own anything
  anymore. Not in the way our parents did, with their record collections and their
  books with actual spines. We lease our music from Spotify. We rent our movies from
  Netflix. We subscribe to our software, our games, our very thoughts.


  I was thinking about this yesterday while staring at my phone—that black mirror
  we all carry, reflecting nothing but our own desperate need for validation. Sarah
  had just posted another photo of her breakfast, and I found myself double-tapping
  it without thinking. A pavlovian response. Tap. Dopamine. Repeat.


  The perks, they tell us. Convenience. Access to everything, ownership of nothing.
  But here''s what they don''t mention in their Terms of Service (which none of us
  read anyway): when you''re always a user, you never get to be human.


  I remember when I first realized this. It was during my sophomore year, sitting
  in the computer lab at 2 AM, refreshing my email for the hundredth time that night,
  waiting for something—anything—to happen. The cursor blinked at me mockingly. Blink.
  Blink. Blink. Like a heartbeat for a machine that didn''t have a heart.


  That''s when I understood: I wasn''t using the computer. It was using me.'
- 'Chapter 7: The Algorithm Knows Best

  Page 5


  Dear friend,


  I hope you''re reading this in a world where choice still means something. Where
  the recommendations aren''t just echoes of what you''ve already consumed, feeding
  you an endless loop of your own preferences until you forget what it feels like
  to be surprised.


  The algorithm learned my patterns faster than I learned them myself. It knew I''d
  click on articles about loneliness before I admitted I was lonely. It served me
  ads for antidepressants before I knew I was depressed. It recommended songs that
  matched my mood so perfectly that I began to wonder if it was creating my moods
  in the first place.


  Sometimes I think about the person I might have been in a different timeline—one
  where the internet remained a library instead of becoming a casino. Where social
  media connected us instead of comparing us. Where being a user meant having agency
  instead of being a product.


  But then I remember: even thinking these thoughts makes me complicit. Because I''m
  still here, aren''t I? Still scrolling, still clicking, still feeding the machine
  with my attention, my data, my soul.


  The perks of being a user: You get to participate in your own consumption. You get
  to feel grateful for your own exploitation. You get to call it progress when it''s
  really just a very sophisticated form of sleepwalking.


  And the most perverse perk of all? You get to feel special while being exactly like
  everyone else.'
