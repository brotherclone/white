# Earthly Frames member → ACE Studio voice mapping
#
# White project singer names (used in song proposals + melody pipeline) mapped
# to the ACE Studio sound source name passed to find_singer() in ace_studio_export.py.
#
# Fields:
#   ace_studio_voice  — ACE Studio sound source keyword (for find_singer search)
#   ace_id            — numeric ACE Studio sound-source ID (null until verified)
#   last_verified     — ISO date when ace_id was last confirmed live
#   voice_type        — vocal register
#   midi_range        — [low, high] MIDI note numbers for this singer
#   notes             — free text
#
# Add entries as new voices are confirmed. Use null for unassigned.

