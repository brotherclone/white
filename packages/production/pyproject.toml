[project]
name = "white-production"
version = "0.1.0"
description = "Logic Pro world — real audio, mixing, outsourcing — greenfield"
requires-python = ">=3.12"
dependencies = [
    "white-core>=0.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/white_production"]

[tool.uv.sources]
white-core = { workspace = true }
