[project]
name = "white-composition"
version = "0.1.0"
description = "Production orchestration, pipeline runner, and candidate review for White project"
requires-python = ">=3.12"
dependencies = [
    "white-core>=0.1.0",
    "white-generation>=0.1.0",
    "mido>=1.3.0",
    "pyyaml>=6.0.0",
    "anthropic>=0.34.0",
    "langchain-anthropic>=0.2.0",
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/white_composition"]

[tool.uv.sources]
white-core = { workspace = true }
white-generation = { workspace = true }
