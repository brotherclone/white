[project]
name = "white-analysis"
version = "0.1.0"
description = "Refractor fitness function and chromatic scoring for White project"
requires-python = ">=3.12"
dependencies = [
    "white-core>=0.1.0",
    "white-training>=0.1.0",
    "numpy>=1.24.0",
    "onnxruntime>=1.15.0",
    "pyyaml>=6.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/white_analysis"]

[tool.uv.sources]
white-core = { workspace = true }
white-training = { workspace = true }
