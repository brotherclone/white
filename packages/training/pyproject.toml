[project]
name = "white-training"
version = "0.1.0"
description = "ML model definitions, training pipelines, and scoring tools for the White project"
requires-python = ">=3.12"
dependencies = [
    "white-core>=0.1.0",
    "numpy>=1.24.0",
    "pandas>=2.0.0",
    "scipy>=1.10.0",
    "scikit-learn>=1.0.0",
    "tqdm>=4.0.0",
    "matplotlib>=3.5.0",
    "pyyaml>=6.0.0",
    "torch>=2.0.0",
    "transformers>=4.30.0",
    "datasets>=2.0.0",
    "soundfile>=0.12.0",
    "langgraph>=0.1.0",
    "modal>=0.50.0",
]

[tool.uv.sources]
white-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/white_training"]
