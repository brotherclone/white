rationale: 'Indigo is the one color in the chromatic synthesis framework that doesn''t
  fit — it''s described as "Known, Forgotten" and parenthetically marked as "isn''t
  real." That''s the compositional key to everything here. Indigo isn''t a stable
  duality like Red''s Past/Thing/Known; it''s a contradiction held in suspension,
  a color the eye argues about, a wavelength that exists in dispute. The arrangement
  has to *be* that: it has to feel like something you almost recognized, almost remembered,
  almost understood — and then didn''t.


  **The naming as structure.** Tomax and Xamot are G.I. Joe''s Crimson Twins — mirror-image
  saboteurs who share a psychic link. One feels pain when the other is injured. They''re
  literally the same person split, Known and Forgotten of the same fact. Using them
  as the primary verse/refrain pair does exactly the compositional work Indigo demands:
  they''re not Verse A and Chorus, they''re *the same thing estranged from itself.*
  Tomax opens the song in confident folk-ballad sincerity. Xamot returns that exact
  shape but torqued — harmonically it may be identical, but the listener now inhabits
  it differently. The Known has become the Forgotten.


  **Flush of Serfs as the data layer.** Seven bars is a strange length. It doesn''t
  resolve cleanly in 4/4 at 128 BPM; it breathes wrong, it creates a half-bar overhang
  that keeps the listener slightly off-balance. That''s intentional. This is where
  the MIDI cipher lives — the carrier wave the concept describes, the folk melody
  straining under encrypted payload. Placing it first after the opening Tomax pair
  means the mask goes on, *then* the transmission begins underneath it. The second
  appearance (doubled) is the cipher at full intensity, the data density peak. Folk
  songs don''t do this. Folk songs repeat because the story grows. This repeats because
  the code needs two full passes to complete its hidden message at the 67 BPM decoding
  rate nested inside the 128 BPM surface.


  **Saul Feels Like Dancing as revelation burst.** Four bars is barely a section —
  it''s a flash. Placing it first after the Xamot estrangement gives the listener
  one moment of compressed joy, the pun turning real, Saul''s conversion-road as playful
  rupture. But it''s too short to trust. Then it returns *after* the doubled Flush
  of Serfs — after the cipher completes — and this time it runs twice, because now
  the spell is confirmed rather than merely glimpsed. The first Saul is a joke. The
  second Saul is the joke becoming a spell. That''s the entire conceptual thesis in
  structural form.


  **The return arc and the Indigo resolution (or non-resolution).** The single Tomax
  return in the back half is deliberately deflated — the opening confidence has drained
  out of the same harmonic material. It''s a quotation of sincerity rather than sincerity
  itself, and the listener feels this without necessarily knowing why. Then the double
  Saul dances, then a single closing Xamot. The song ends on the wrong twin, the mirror-version,
  the estranged reflection. Indigo''s "isn''t real" status means the song cannot end
  on arrival or resolution. It ends on the question of whether anything it just did
  actually happened — the Forgotten folding back over the Known, the color you can''t
  quite see asserting itself one last time by disappearing.


  **Runtime and breath.** Total bars: (5×2) + 7 + (5×2) + 4 + (7×2) + 5 + (4×2) +
  5 = 10+7+10+4+14+5+8+5 = 63 bars. At 128 BPM in 4/4, that''s approximately 7 minutes
  23 seconds — long for pop, correct for puzzle-pop with a hidden second song inside
  it. The runtime itself is part of the disguise: it takes exactly long enough to
  feel like a complete sincere folk confessional while also providing sufficient data
  payload for the MIDI cipher to encode "the pun turned real" at its 67 BPM decoding
  rate. The song earns its length the way a good spell earns its syllables.'
