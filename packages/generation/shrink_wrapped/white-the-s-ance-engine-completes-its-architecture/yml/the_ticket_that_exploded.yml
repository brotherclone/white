excerpts:
- 'The virus is in the word and the word is in the virus. Hassan-i-Sabbah knew this
  when he cut up the Koran and reassembled it into new configurations of meaning.
  The Control Machine operates through language—every word a potential infection vector,
  every sentence a possible escape route.


  I have been tracking the Word Virus through seventeen dimensions of textual space.
  The coordinates shift constantly: Tangier 1958 bleeds into Nova Express 2005, which
  folds back into the Interzone of eternal present. Time is a flat circle when you''re
  riding the reality film backwards through the editing room of consciousness.


  The ticket exploded in my hand as I tried to board the Nova Express. Fragments of
  paper became butterflies became binary code became the screaming of subway brakes
  in a city that exists only in the spaces between words. This is how the Control
  System maintains its grip—through the illusion of linear narrative, through the
  myth of individual consciousness, through the lie that words mean what they seem
  to mean.


  But Hassan-i-Sabbah taught us: "Nothing is true, everything is permitted." The cut-up
  method reveals the true structure of reality—not the imposed order of beginning-middle-end,
  but the chaotic swirl of possibilities that exists when you slice through the control
  grid of conventional syntax.'
- 'NOVA POLICE BULLETIN #47-B

  RE: WORD VIRUS CONTAINMENT PROTOCOLS


  Agent K-9 reports successful infiltration of the Reality Studio. The Board of Directors
  continues to pump out standardized narrative units through the Dream Machine, but
  we have identified several weak points in their operation:


  1. The repetition compulsion that drives consumers to seek identical experiences
  disguised as novelty

  2. The addiction to linear time that prevents recognition of the eternal Now

  3. The belief in fixed identity that obscures the fluid nature of consciousness


  RECOMMENDED COUNTERMEASURES:

  Deploy cut-up agents at all major media nodes. Introduce random elements into broadcast
  streams. Encourage spontaneous word-association exercises among civilian populations.
  Remember: the weapon that will bring down the Control System is already in their
  hands—language itself, when freed from the prison of conventional meaning.


  The Heavy Metal Kid has been spotted in Sector 7, distributing bootleg recordings
  of silence. The Subliminal Kid continues his work in the advertising district, inserting
  liberation frequencies into consumer hypnosis patterns. All agents are reminded
  that this operation exists outside normal space-time coordinates. Report to your
  sector chief in the year that never was.'
