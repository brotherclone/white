[project]
name = "white-generation"
version = "0.1.0"
description = "MIDI pattern templates and generation pipelines for White project"
requires-python = ">=3.12"
dependencies = [
    "white-core>=0.1.0",
    "white-analysis>=0.1.0",
    "mido>=1.3.0",
    "numpy>=1.24.0",
    "pyyaml>=6.0.0",
    "pyphen>=0.14.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/white_generation"]

[tool.uv.sources]
white-core = { workspace = true }
white-analysis = { workspace = true }
