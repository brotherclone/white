[project]
name = "white-diary"
version = "0.1.0"
description = "Song lifecycle diary — greenfield"
requires-python = ">=3.12"
dependencies = [
    "white-core>=0.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/white_diary"]

[tool.uv.sources]
white-core = { workspace = true }
