[project]
name = "white-ideation"
version = "0.1.0"
description = "Agents, reference data, and creative ideation for White project"
requires-python = ">=3.12"
dependencies = [
    "white-core>=0.1.0",
    "white-extraction>=0.1.0",
    "white-analysis>=0.1.0",
    "white-composition>=0.1.0",
    "anthropic>=0.34.0",
    "langchain-anthropic>=0.2.0",
    "langgraph>=0.2.0",
    "langchain-core>=0.3.0",
    "pyyaml>=6.0.0",
    "assemblyai>=0.46.0",
    "sounddevice>=0.5.2",
    "soundfile>=0.12.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/white_ideation"]

[tool.uv.sources]
white-core = { workspace = true }
white-extraction = { workspace = true }
white-analysis = { workspace = true }
white-composition = { workspace = true }
